<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP DataViz 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <!-- ECharts pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>

    <div class="experience">
        <canvas id="experience-canv"></canvas>
    </div>

    <!-- Modal pour afficher les données -->
    <div class="modal hidden">
        <div class="modal-wrapper">
            <div class="modal-header">
                <div class="modal-title">Titre</div>
                <button class="modal-exit-button">✕</button>
            </div>
            <div class="modal-content">
                <div class="modal-content-wrapper">
                    <!-- Layout flex pour image + graphique -->
                    <div class="modal-visual">
                        <!-- Image du constructeur -->
                        <div class="modal-image-container">
                            <img id="modal-image" src="" alt="" class="modal-image hidden">
                        </div>
                        <!-- Container pour le graphique ECharts -->
                        <div id="modal-chart" class="modal-chart"></div>
                    </div>
                    <!-- Description -->
                    <div class="modal-project-description"></div>
                    <!-- Stats -->
                    <div class="modal-stats"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.149.0/examples/jsm/"
    }
}
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
